name: Build Boston Overlay Fix

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unpack Source Archive
        run: |
          set -e
          if [ -f boston_module.zip ]; then
            echo "Unzipping repository source files..."
            unzip -o boston_module.zip
            rm -f boston_module.zip
            
            PROP_PATH=$(find . -name "module.prop" -print -quit)
            if [ -n "$PROP_PATH" ]; then
              PARENT_DIR=$(dirname "$PROP_PATH")
              if [ "$PARENT_DIR" != "." ]; then
                echo "Found nested project source root at: $PARENT_DIR"
                mv "$PARENT_DIR"/* . 2>/dev/null || true
                mv "$PARENT_DIR"/.* . 2>/dev/null || true
                rm -rf "$PARENT_DIR"
              fi
            else
              echo "ERROR: module.prop not found!"
              exit 1
            fi
            ls -la
          else
            echo "ERROR: boston_module.zip not found!"
            exit 1
          fi

      - name: Assemble Flashable Direct Injection Magisk Zip
        run: |
          set -e
          sudo apt-get update && sudo apt-get install -y zip unzip

          STAGING=module_staging
          rm -rf "$STAGING"
          mkdir -p "$STAGING/META-INF/com/google/android"
          mkdir -p "$STAGING/common"
          mkdir -p "$STAGING/overlay/vendor/overlay"

          # 1. Copy core Magisk properties
          cp module.prop "$STAGING/"
          if [ -f system.prop ]; then
            cp system.prop "$STAGING/"
          fi
          
          # Force signature safety override directly inside system properties injection
          echo "" >> "$STAGING/system.prop"
          echo "ro.boot.vendor.overlay.ignore_signature=true" >> "$STAGING/system.prop"
          
          # 2. Copy internal Magisk shell scripts and installer assets
          cp -r META-INF/* "$STAGING/META-INF/" 2>/dev/null || true
          cp -r common/* "$STAGING/common/" 2>/dev/null || true
          
          # 3. DIRECT INJECTION: Copy your original working overlay folder assets (including audio_effects.xml and your working V1 APKs)
          if [ -d "overlay" ]; then
            echo "Injecting original working overlay assets, audio profiles, and pre-compiled APKs..."
            cp -r overlay/* "$STAGING/overlay/" 2>/dev/null || true
          else
            echo "ERROR: The 'overlay' directory containing your working assets was not found!"
            exit 1
          fi

          # 4. Verify everything is in place before compression
          echo "=== Verifying Staging Directory Structure ==="
          ls -la "$STAGING"
          ls -la "$STAGING/overlay/vendor/overlay/" 2>/dev/null || true
          ls -la "$STAGING/overlay/vendor/etc/" 2>/dev/null || true

          # 5. Pack it into the final release zip
          cd "$STAGING"
          zip -r -X ../boston_gsi_overlay_fix_v1.3.0.zip . -x ".*"
          cd ..

      - name: Upload flashable zip
        uses: actions/upload-artifact@v4
        with:
          name: boston_gsi_overlay_fix_v1.3.0
          path: "*.zip"
          retention-days: 30
