name: Build Boston Overlay Fix

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unpack Source Archive
        run: |
          set -e
          if [ -f boston_module.zip ]; then
            echo "Unzipping repository source files..."
            unzip -o boston_module.zip
            rm -f boston_module.zip
            
            PROP_PATH=$(find . -name "module.prop" -print -quit)
            if [ -n "$PROP_PATH" ]; then
              PARENT_DIR=$(dirname "$PROP_PATH")
              if [ "$PARENT_DIR" != "." ]; then
                echo "Found nested project source root at: $PARENT_DIR"
                mv "$PARENT_DIR"/* . 2>/dev/null || true
                mv "$PARENT_DIR"/.* . 2>/dev/null || true
                rm -rf "$PARENT_DIR"
              fi
            else
              echo "ERROR: module.prop not found!"
              exit 1
            fi
            ls -la
          else
            echo "ERROR: boston_module.zip not found!"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK (tools + platform-tools)
        uses: android-actions/setup-android@v4

      - name: Install build-tools and platform
        run: |
          set -e
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "build-tools;35.0.0" "platforms;android-35"

      - name: Locate SDK tools
        id: sdk
        run: |
          set -e
          BUILD_TOOLS="$ANDROID_HOME/build-tools/35.0.0"
          PLATFORM_JAR="$ANDROID_HOME/platforms/android-35/android.jar"
          echo "build_tools=$BUILD_TOOLS" >> "$GITHUB_OUTPUT"
          echo "platform_jar=$PLATFORM_JAR" >> "$GITHUB_OUTPUT"

      - name: Generate signing keystore
        run: |
          set -e
          keytool -genkeypair -v \
            -keystore boston_overlay_debug.keystore \
            -alias boston-overlay \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass boston-overlay-debug -keypass boston-overlay-debug \
            -dname "CN=Boston Overlay Fix V1, OU=Personal, O=Personal, L=Unknown, ST=Unknown, C=US"

      - name: Link, align, and sign each overlay
        run: |
          AAPT2="${{ steps.sdk.outputs.build_tools }}/aapt2"
          ZIPALIGN="${{ steps.sdk.outputs.build_tools }}/zipalign"
          APKSIGNER="${{ steps.sdk.outputs.build_tools }}/apksigner"
          FRAMEWORK="${{ steps.sdk.outputs.platform_jar }}"

          mkdir -p build_output dist

          FAILED=0
          for overlay_dir in overlays/*/; do
            if [ ! -d "$overlay_dir" ]; then continue; fi
            name=$(basename "$overlay_dir")
            manifest="$overlay_dir/AndroidManifest.xml"
            
            # Find the compiled resource zip dynamically wherever it is placed
            compiled_zip=$(find . -name "${name}.zip" ! -path "./module_staging/*" -print -quit)

            if [ -z "$compiled_zip" ] || [ ! -f "$compiled_zip" ]; then
              echo "SKIP $name: no compiled resource zip found"
              continue
            fi

            echo "=== Compiling, Aligning and Signing $name ==="

            "$AAPT2" link \
              -I "$FRAMEWORK" \
              --manifest "$manifest" \
              --allow-reserved-package-id \
              --no-resource-removal \
              -o "build_output/${name}.unsigned.apk" \
              "$compiled_zip"
            
            if [ $? -ne 0 ]; then
              echo "!!! aapt2 link FAILED for $name"
              FAILED=1
              continue
            fi

            "$ZIPALIGN" -f 4 \
              "build_output/${name}.unsigned.apk" \
              "build_output/${name}.aligned.apk"

            "$APKSIGNER" sign \
              --ks boston_overlay_debug.keystore \
              --ks-pass pass:boston-overlay-debug \
              --ks-key-alias boston-overlay \
              --out "dist/${name}.apk" \
              "build_output/${name}.aligned.apk"
            
            if [ $? -ne 0 ]; then
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

      - name: Assemble flashable Magisk zip
        run: |
          set -e
          sudo apt-get update && sudo apt-get install -y zip unzip

          STAGING=module_staging
          rm -rf "$STAGING"
          mkdir -p "$STAGING/META-INF/com/google/android"
          mkdir -p "$STAGING/common"
          mkdir -p "$STAGING/overlay/product/overlay"
          mkdir -p "$STAGING/overlay/vendor/etc"

          cp module.prop "$STAGING/"
          if [ -f system.prop ]; then
            cp system.prop "$STAGING/"
          fi
          
          echo "" >> "$STAGING/system.prop"
          echo "ro.boot.vendor.overlay.ignore_signature=true" >> "$STAGING/system.prop"
          
          cp -r META-INF/* "$STAGING/META-INF/" 2>/dev/null || true
          cp -r common/* "$STAGING/common/" 2>/dev/null || true
          
          # Find and inject your custom audio_effects configuration profile
          AUDIO_PATH=$(find . -type f -name "audio_effects.xml" ! -path "./$STAGING/*" -print -quit)
          if [ -n "$AUDIO_PATH" ]; then
            cp "$AUDIO_PATH" "$STAGING/overlay/vendor/etc/audio_effects.xml"
          fi
          
          # Move the compiled production-ready APKs into the Magisk module tree structure
          cp dist/*.apk "$STAGING/overlay/product/overlay/"

          cd "$STAGING"
          zip -r -X ../boston_gsi_overlay_fix_v1.3.0.zip . -x ".*"
          cd ..

      - name: Upload flashable zip
        uses: actions/upload-artifact@v4
        with:
          name: boston_gsi_overlay_fix_v1.3.0
          path: "*.zip"
          retention-days: 30
