name: Build Boston Overlay Fix

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK (tools + platform-tools)
        uses: android-actions/setup-android@v4

      - name: Install build-tools and platform
        run: |
          set -e
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "build-tools;35.0.0" "platforms;android-35"

      - name: Locate SDK tools
        id: sdk
        run: |
          set -e
          BUILD_TOOLS="$ANDROID_HOME/build-tools/35.0.0"
          PLATFORM_JAR="$ANDROID_HOME/platforms/android-35/android.jar"
          if [ ! -d "$BUILD_TOOLS" ]; then
            echo "ERROR: build-tools;35.0.0 did not install to expected path $BUILD_TOOLS"
            find "$ANDROID_HOME/build-tools" -maxdepth 1
            exit 1
          fi
          if [ ! -f "$PLATFORM_JAR" ]; then
            echo "ERROR: android.jar not found at expected path $PLATFORM_JAR"
            find "$ANDROID_HOME/platforms" -maxdepth 2
            exit 1
          fi
          echo "build_tools=$BUILD_TOOLS" >> "$GITHUB_OUTPUT"
          echo "platform_jar=$PLATFORM_JAR" >> "$GITHUB_OUTPUT"

      - name: Generate signing keystore
        run: |
          set -e
          keytool -genkeypair -v \
            -keystore boston_overlay_debug.keystore \
            -alias boston-overlay \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass boston-overlay-debug -keypass boston-overlay-debug \
            -dname "CN=Boston Overlay Fix V1, OU=Personal, O=Personal, L=Unknown, ST=Unknown, C=US"

      - name: Link, align, and sign each overlay
        run: |
          AAPT2="${{ steps.sdk.outputs.build_tools }}/aapt2"
          ZIPALIGN="${{ steps.sdk.outputs.build_tools }}/zipalign"
          APKSIGNER="${{ steps.sdk.outputs.build_tools }}/apksigner"
          FRAMEWORK="${{ steps.sdk.outputs.platform_jar }}"

          mkdir -p build_output dist

          FAILED=0
          for overlay_dir in overlays/*/; do
            name=$(basename "$overlay_dir")
            manifest="$overlay_dir/AndroidManifest.xml"
            compiled_zip="compiled_resources/${name}.zip"

            if [ ! -f "$compiled_zip" ]; then
              echo "SKIP $name: no compiled resource zip at $compiled_zip"
              continue
            fi

            echo "=== Building $name ==="

            "$AAPT2" link \
              -I "$FRAMEWORK" \
              --manifest "$manifest" \
              -o "build_output/${name}.unsigned.apk" \
              "$compiled_zip"
            link_status=$?

            if [ "$link_status" -ne 0 ]; then
              echo "!!! aapt2 link FAILED for $name (exit $link_status)"
              FAILED=1
              continue
            fi

            "$ZIPALIGN" -f 4 \
              "build_output/${name}.unsigned.apk" \
              "build_output/${name}.aligned.apk"
            align_status=$?

            if [ "$align_status" -ne 0 ]; then
              echo "!!! zipalign FAILED for $name (exit $align_status)"
              FAILED=1
              continue
            fi

            "$APKSIGNER" sign \
              --ks boston_overlay_debug.keystore \
              --ks-pass pass:boston-overlay-debug \
              --ks-key-alias boston-overlay \
              --out "dist/${name}.apk" \
              "build_output/${name}.aligned.apk"
            sign_status=$?

            if [ "$sign_status" -eq 0 ]; then
              echo "OK: dist/${name}.apk"
            else
              echo "!!! apksigner FAILED for $name (exit $sign_status)"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "One or more overlays failed. Failing the build rather than"
            echo "shipping a partial module that silently omits fixes."
            exit 1
          fi

          ls -la dist/

      - name: Assemble flashable Magisk zip
        run: |
          set -e
          STAGING=module_staging
          rm -rf "$STAGING"
          mkdir -p "$STAGING/META-INF/com/google/android"
          mkdir -p "$STAGING/common"
          mkdir -p "$STAGING/overlay/product/overlay"

          cp module.prop "$STAGING/"
          if [ -f system.prop ]; then
            cp system.prop "$STAGING/"
          fi
          cp META-INF/com/google/android/update-binary "$STAGING/META-INF/com/google/android/"
          cp META-INF/com/google/android/updater-script "$STAGING/META-INF/com/google/android/"
          cp common/customize.sh "$STAGING/common/"
          cp common/post-fs-data.sh "$STAGING/common/"
          cp common/service.sh "$STAGING/common/"
          cp dist/*.apk "$STAGING/overlay/product/overlay/"

          cd "$STAGING"
          zip -r -X ../boston_gsi_overlay_fix_v1.zip . -x ".*"
          cd ..

          echo "=== Final zip contents ==="
          unzip -l boston_gsi_overlay_fix_v1.zip

      - name: Upload flashable zip
        uses: actions/upload-artifact@v4
        with:
          name: boston_gsi_overlay_fix_v1
          path: boston_gsi_overlay_fix_v1.zip
          retention-days: 30